version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  FillFormAI — Docker Compose (Development)
#  Run: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  APP_ENV: development
  DEBUG: "true"
  DATABASE_URL: postgresql+asyncpg://fillform:fillformpass@postgres:5432/fillformai
  REDIS_URL: redis://redis:6379/0
  MONGO_URL: mongodb://mongo:27017
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SECRET_KEY: dev-secret-key-change-in-production-min-64-chars-xxxxxxxxxxx
  JWT_ACCESS_EXPIRE_MINUTES: "60"
  JWT_REFRESH_EXPIRE_DAYS: "30"
  S3_ENDPOINT_URL: http://minio:9000
  S3_BUCKET: fillformai-documents
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  CORS_ORIGINS: "http://localhost:8080,http://localhost:3000"

x-service-base: &service-base
  build:
    context: ./backend
    dockerfile: infrastructure/docker/Dockerfile.service
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
  networks:
    - fillform-net
  volumes:
    - ./backend:/app
  environment:
    <<: *common-env

services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fillform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fillformai
      POSTGRES_USER: fillform
      POSTGRES_PASSWORD: fillformpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - fillform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fillform -d fillformai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fillform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fillform-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: fillform-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - fillform-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fillform-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - fillform-net

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fillform-kafka
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fillform-net

  minio:
    image: minio/minio:latest
    container_name: fillform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - fillform-net

  # ── API Gateway (Kong-lite via NGINX) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fillform-gateway
    volumes:
      - ./backend/infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - auth-service
      - profile-service
      - opportunity-service
      - application-service
      - document-service
      - agent-service
      - ai-service
      - payment-service
      - notification-service
      - scraper-service
    networks:
      - fillform-net

  # ── Microservices ──────────────────────────────────────────────────────────
  auth-service:
    <<: *service-base
    container_name: fillform-auth
    command: uvicorn backend.services.auth_service.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      SERVICE_NAME: auth-service

  profile-service:
    <<: *service-base
    container_name: fillform-profile
    command: uvicorn backend.services.profile_service.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      SERVICE_NAME: profile-service

  opportunity-service:
    <<: *service-base
    container_name: fillform-opportunity
    command: uvicorn backend.services.opportunity_service.main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      SERVICE_NAME: opportunity-service

  application-service:
    <<: *service-base
    container_name: fillform-application
    command: uvicorn backend.services.application_service.main:app --host 0.0.0.0 --port 8004 --reload
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      SERVICE_NAME: application-service

  document-service:
    <<: *service-base
    container_name: fillform-document
    command: uvicorn backend.services.document_service.main:app --host 0.0.0.0 --port 8005 --reload
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      SERVICE_NAME: document-service

  agent-service:
    <<: *service-base
    container_name: fillform-agent
    command: uvicorn backend.services.agent_service.main:app --host 0.0.0.0 --port 8006 --reload
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      SERVICE_NAME: agent-service

  notification-service:
    <<: *service-base
    container_name: fillform-notification
    command: uvicorn backend.services.notification_service.main:app --host 0.0.0.0 --port 8007 --reload
    ports:
      - "8007:8007"
    environment:
      <<: *common-env
      SERVICE_NAME: notification-service

  ai-service:
    <<: *service-base
    container_name: fillform-ai
    command: uvicorn backend.services.ai_service.main:app --host 0.0.0.0 --port 8008 --reload
    ports:
      - "8008:8008"
    environment:
      <<: *common-env
      SERVICE_NAME: ai-service
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  payment-service:
    <<: *service-base
    container_name: fillform-payment
    command: uvicorn backend.services.payment_service.main:app --host 0.0.0.0 --port 8009 --reload
    ports:
      - "8009:8009"
    environment:
      <<: *common-env
      SERVICE_NAME: payment-service

  scraper-service:
    <<: *service-base
    container_name: fillform-scraper
    command: uvicorn backend.services.scraper_service.main:app --host 0.0.0.0 --port 8010 --reload
    ports:
      - "8010:8010"
    environment:
      <<: *common-env
      SERVICE_NAME: scraper-service
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # ── Frontend (Flutter Web) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fillform-frontend
    ports:
      - "8080:80"
    networks:
      - fillform-net
    volumes:
      - ./frontend:/app
      - /app/build

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fillform-prometheus
    volumes:
      - ./backend/infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - fillform-net

  grafana:
    image: grafana/grafana:latest
    container_name: fillform-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - fillform-net

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  minio_data:
  grafana_data:

networks:
  fillform-net:
    driver: bridge

events { worker_connections 4096; }

http {
    upstream auth        { server auth-service:8001; }
    upstream profile     { server profile-service:8002; }
    upstream opportunity { server opportunity-service:8003; }
    upstream application { server application-service:8004; }
    upstream document    { server document-service:8005; }
    upstream agent       { server agent-service:8006; }
    upstream notification { server notification-service:8007; }
    upstream ai          { server ai-service:8008; }
    upstream payment     { server payment-service:8009; }
    upstream scraper     { server scraper-service:8010; }

    server {
        listen 80;
        client_max_body_size 50M;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
        limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

        # Auth routes (strict rate limit)
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/profile/    { proxy_pass http://profile; }
        location /api/v1/opportunities/ { proxy_pass http://opportunity; }
        location /api/v1/applications/  { proxy_pass http://application; }
        location /api/v1/documents/     { proxy_pass http://document; }
        location /api/v1/agents/        { proxy_pass http://agent; }
        location /api/v1/sessions/      { proxy_pass http://agent; }
        location /api/v1/notifications/ { proxy_pass http://notification; }
        location /api/v1/ai/            { proxy_pass http://ai; }
        location /api/v1/payments/      { proxy_pass http://payment; }
        location /api/v1/scraper/       { proxy_pass http://scraper; }

        # Health aggregator
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
